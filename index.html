<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Funding Leads Tracker</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 20px;
    max-width: 900px;
  }
  h1 {
    text-align: center;
  }
  form > div {
    margin-bottom: 10px;
  }
  label {
    display: inline-block;
    width: 170px;
    font-weight: bold;
    vertical-align: top;
  }
  input[type="text"], input[type="url"], input[type="date"], select, textarea {
    width: 70%;
    padding: 6px;
    box-sizing: border-box;
  }
  textarea {
    height: 60px;
  }
  button {
    margin-top: 10px;
    padding: 8px 12px;
    cursor: pointer;
  }
  table {
    border-collapse: collapse;
    margin-top: 20px;
    width: 100%;
  }
  th, td {
    padding: 8px 6px;
    border: 1px solid #ccc;
    text-align: left;
  }
  th {
    background-color: #f2f2f2;
  }
  .nowrap {
    white-space: nowrap;
  }
</style>
</head>
<body>

<h1>Funding Leads Tracker</h1>

<form id="leadForm">
  <div><label for="source">Funding Source:</label><input type="text" id="source" required /></div>
  <div><label for="website">Website Link:</label><input type="url" id="website" placeholder="https://example.com" /></div>
  <div><label for="summary">Summary:</label><textarea id="summary"></textarea></div>
  <div><label for="eligible">Eligible Applicants:</label><input type="text" id="eligible" /></div>
  <div><label for="categories">Funding Categories:</label><input type="text" id="categories" placeholder="e.g., workforce, capital" /></div>
  <div><label for="match">Match Requirement:</label>
    <select id="match">
      <option value="No">No</option>
      <option value="Yes">Yes</option>
      <option value="Partial">Partial</option>
    </select>
  </div>
  <div><label for="deadline">Application Deadline:</label><input type="date" id="deadline" /></div>
  <div><label for="contact">Contact Info:</label><input type="text" id="contact" placeholder="email or phone" /></div>
  <div><label for="notes">Notes:</label><textarea id="notes"></textarea></div>
  <div><label for="interest">Interest Level:</label>
    <select id="interest">
      <option value="Low">Low</option>
      <option value="Medium">Medium</option>
      <option value="High">High</option>
    </select>
  </div>
  <button type="submit">Add Lead</button>
  <button type="button" id="exportBtn">Download CSV</button>
  <button type="button" id="clearBtn">Clear All Leads</button>
</form>

<table id="leadsTable">
  <thead>
    <tr>
      <th>Funding Source</th>
      <th>Website</th>
      <th>Summary</th>
      <th>Eligible Applicants</th>
      <th>Funding Categories</th>
      <th>Match Requirement</th>
      <th>Application Deadline</th>
      <th>Contact Info</th>
      <th>Notes</th>
      <th>Interest Level</th>
    </tr>
  </thead>
  <tbody>
  </tbody>
</table>

<script>
  const form = document.getElementById('leadForm');
  const leadsTableBody = document.querySelector('#leadsTable tbody');
  const exportBtn = document.getElementById('exportBtn');
  const clearBtn = document.getElementById('clearBtn');
  const storageKey = 'fundingLeadsData';

  // Load leads from localStorage and display
  function loadLeads() {
    const leads = JSON.parse(localStorage.getItem(storageKey)) || [];
    leadsTableBody.innerHTML = '';
    leads.forEach(lead => addLeadRow(lead));
  }

  // Add a lead row to the table
  function addLeadRow(lead) {
    const tr = document.createElement('tr');
    for (const key of ['source', 'website', 'summary', 'eligible', 'categories', 'match', 'deadline', 'contact', 'notes', 'interest']) {
      const td = document.createElement('td');
      if (key === 'website' && lead[key]) {
        const link = document.createElement('a');
        link.href = lead[key];
        link.target = '_blank';
        link.textContent = lead[key];
        td.appendChild(link);
      } else {
        td.textContent = lead[key] || '';
      }
      tr.appendChild(td);
    }
    leadsTableBody.appendChild(tr);
  }

  // Save leads to localStorage
  function saveLeads(leads) {
    localStorage.setItem(storageKey, JSON.stringify(leads));
  }

  // Convert data to CSV format
  function toCSV(leads) {
    const headers = ['Funding Source','Website','Summary','Eligible Applicants','Funding Categories','Match Requirement','Application Deadline','Contact Info','Notes','Interest Level'];
    const csvRows = [headers.join(',')];
    leads.forEach(lead => {
      const row = [
        `"${lead.source.replace(/"/g, '""')}"`,
        `"${lead.website.replace(/"/g, '""')}"`,
        `"${lead.summary.replace(/"/g, '""')}"`,
        `"${lead.eligible.replace(/"/g, '""')}"`,
        `"${lead.categories.replace(/"/g, '""')}"`,
        `"${lead.match.replace(/"/g, '""')}"`,
        `"${lead.deadline}"`,
        `"${lead.contact.replace(/"/g, '""')}"`,
        `"${lead.notes.replace(/"/g, '""')}"`,
        `"${lead.interest.replace(/"/g, '""')}"`
      ];
      csvRows.push(row.join(','));
    });
    return csvRows.join('\n');
  }

  // Event: on form submit
  form.addEventListener('submit', e => {
    e.preventDefault();
    const newLead = {
      source: form.source.value.trim(),
      website: form.website.value.trim(),
      summary: form.summary.value.trim(),
      eligible: form.eligible.value.trim(),
      categories: form.categories.value.trim(),
      match: form.match.value,
      deadline: form.deadline.value,
      contact: form.contact.value.trim(),
      notes: form.notes.value.trim(),
      interest: form.interest.value
    };
    const leads = JSON.parse(localStorage.getItem(storageKey)) || [];
    leads.push(newLead);
    saveLeads(leads);
    addLeadRow(newLead);
    form.reset();
  });

  // Event: on export button click
  exportBtn.addEventListener('click', () => {
    const leads = JSON.parse(localStorage.getItem(storageKey)) || [];
    if (leads.length === 0) {
      alert('No leads to export');
      return;
    }
    const csvData = toCSV(leads);
    const blob = new Blob([csvData], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'funding_leads.csv';
    a.style.display = 'none';
    document.body.appendChild(a);
    a.click();
    URL.revokeObjectURL(url);
    a.remove();
  });

  // Event: clear all leads
  clearBtn.addEventListener('click', () => {
    if (confirm('Are you sure you want to clear all saved leads? This action cannot be undone.')) {
      localStorage.removeItem(storageKey);
      leadsTableBody.innerHTML = '';
    }
  });

  loadLeads();
</script>

</body>
</html>
